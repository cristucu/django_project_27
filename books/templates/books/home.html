<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Manager 1.0</title>
</head>
<body>

    <a href="{% url 'create_book' %}">Create new book</a>
    <ul>
        {% for b in books %}
        <li>{{ b.title }} - {{ b.author }} <a href="{% url 'delete_book' b.pk %}" title="Delete book">🗑️</a></li>
        {% endfor %}
    </ul>
</body>
</html>
